x-restart: &restart
  restart: always

services:
  qdrant-mcp:
    <<: *restart
    build: ./backend
    command: python -m lorekeeper.qdrant_mcp_extended
    env_file: ./backend/.env
    volumes:
      - fastembed-cache:/root/.cache/fastembed

  obsidian-mcp:
    <<: *restart
    build: ./backend
    command: python -m lorekeeper.obsidian_portal.mcp_server
    env_file: ./backend/.env

  api:
    <<: *restart
    build: ./backend
    command: uvicorn lorekeeper.api:app --host 0.0.0.0 --port 8001
    env_file: ./backend/.env
    environment:
      QDRANT_MCP_URL: http://qdrant-mcp:8000/mcp
      OBSIDIAN_MCP_URL: http://obsidian-mcp:8080/mcp
      DATA_DIR: /data
    volumes:
      - fastembed-cache:/root/.cache/fastembed
      - fetched-data:/data
    depends_on: [qdrant-mcp, obsidian-mcp]

  cron:
    <<: *restart
    build: ./cron
    init: true
    depends_on: [api]

  frontend:
    <<: *restart
    build: ./frontend
    ports:
      - "5173:80"
    env_file:
      - ./frontend/.env
    depends_on: [api]

volumes:
  fastembed-cache:
  fetched-data:
