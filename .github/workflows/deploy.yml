name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  build-frontend:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
        env:
          SENTRY_RELEASE: ${{ github.event.workflow_run.head_sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_FRONTEND_PROJECT }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/galst1234/lorekeeper-frontend:latest
            ghcr.io/galst1234/lorekeeper-frontend:${{ github.event.workflow_run.head_sha }}
          build-args: |
            SENTRY_RELEASE=${{ github.event.workflow_run.head_sha }}
          cache-from: type=registry,ref=ghcr.io/galst1234/lorekeeper-frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/galst1234/lorekeeper-frontend:buildcache,mode=max

  build-backend:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/galst1234/lorekeeper-backend:latest
            ghcr.io/galst1234/lorekeeper-backend:${{ github.event.workflow_run.head_sha }}
          build-args: |
            SENTRY_RELEASE=${{ github.event.workflow_run.head_sha }}
          cache-from: type=registry,ref=ghcr.io/galst1234/lorekeeper-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/galst1234/lorekeeper-backend:buildcache,mode=max

  build-cron:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./cron
          push: true
          tags: |
            ghcr.io/galst1234/lorekeeper-cron:latest
            ghcr.io/galst1234/lorekeeper-cron:${{ github.event.workflow_run.head_sha }}
          cache-from: type=registry,ref=ghcr.io/galst1234/lorekeeper-cron:buildcache
          cache-to: type=registry,ref=ghcr.io/galst1234/lorekeeper-cron:buildcache,mode=max

  deploy:
    needs: [build-frontend, build-backend, build-cron]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer redeploy
        run: curl -fsS -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
