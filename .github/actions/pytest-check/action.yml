name: Run Pytest
description: Run pytest test suite for a specific project

inputs:
  project-dir:
    description: 'Project directory containing pyproject.toml'
    required: true

runs:
  using: composite
  steps:
    - name: Run Pytest
      shell: bash
      working-directory: ${{ inputs.project-dir }}
      run: uv run --frozen pytest tests/ -v

    - name: Minimize uv cache
      shell: bash
      run: uv cache prune --ci
