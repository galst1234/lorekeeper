repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run --frozen ty check .
        language: system
        types: [python]
        pass_filenames: false

      - id: update-sentry-release
        name: Update SENTRY_RELEASE in .env
        entry: bash -c 'echo "SENTRY_RELEASE=$(git rev-parse HEAD)" > .env'
        language: system
        stages: [post-commit]
        pass_filenames: false
        always_run: true