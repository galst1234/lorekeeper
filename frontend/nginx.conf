server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    auth_basic "Lorekeeper";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location /api {
        proxy_pass http://api:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri /index.html;
    }
}
